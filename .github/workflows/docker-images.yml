name: Docker Images CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu:jammy

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: DockerContainers/API
            image: yass555/todo-api
          - name: mongodb
            context: DockerContainers/MONGODB
            image: yass555/todo-mongodb
          - name: nginx
            context: DockerContainers/NGINX
            image: yass555/todo-nginx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          tags: |
            ${{ matrix.image }}:${{ github.sha }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:1.1
            ${{ matrix.image }}:${{ github.sha }}
