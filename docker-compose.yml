services:

  api:
    # build:  ./DockerContainers/API
    # image: api:my_api
    image: yass555/todo-api:1.1
    ports:
      - 3000:3000
    container_name: api
    secrets:
      - PORT
      - DATABASE
      - DATABASE_PASSWORD
    user: 1000:1000
    networks:
      nodeJsAPI:
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/todos"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    restart: unless-stopped
  
  mongodb:
    # build: ./DockerContainers/MONGODB
    # image: mongodb:my_mongodb
    image: yass555/todo-mongodb:1.1
    ports:
      - 27018:27017
    container_name: mongodb
    networks:
      nodeJsAPI:
    volumes:
      - mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  nginx:
    # build: ./DockerContainers/NGINX
    # image: yass555/todo-nginx:1.0
    image: yass555/todo-nginx:1.1
    ports:
      - 443:443
      - 80:80
    container_name: nginx
    networks:
      nodeJsAPI:
    volumes:
      - nginx:/var/www/html/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  nodeJsAPI:

secrets:

  PORT:
    file: ./DockerContainers/API/secrets/PORT.txt
  DATABASE:
    file: ./DockerContainers/API/secrets/DATABASE.txt
  DATABASE_PASSWORD:
    file: ./DockerContainers/API/secrets/DATABASE_PASSWORD.txt

volumes:

  mongodb:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/adminuser/data/mongodb'

  nginx:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/adminuser/data/nginx'
